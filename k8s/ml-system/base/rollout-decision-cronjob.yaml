apiVersion: batch/v1
kind: CronJob
metadata:
  name: serving-rollout-decision
  labels:
    app.kubernetes.io/name: serving-rollout-decision
spec:
  schedule: '*/15 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: serving-rollout-decision
        spec:
          restartPolicy: Never
          containers:
            - name: rollout-decision
              image: actualbudget/smartcat-mlops:latest
              imagePullPolicy: IfNotPresent
              workingDir: /workspace
              env:
                - name: MLFLOW_TRACKING_URI
                  value: http://mlflow:5000
                - name: MLFLOW_PROMOTION_ALIAS
                  value: production
                - name: MLFLOW_S3_ENDPOINT_URL
                  value: http://mlflow-minio:9000
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: mlflow-platform-secrets
                      key: minio-root-user
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: mlflow-platform-secrets
                      key: minio-root-password
              command: ['python']
              args:
                - serving/tools/execute_rollout_action.py
                - --execute
                - --monitor-url
                - http://smartcat-serving:8000/monitor/decision
                - --challenger-dir
                - /workspace/artifacts/pipeline/challenger
                - --deployed-dir
                - /workspace/artifacts/deployed
                - --archive-dir
                - /workspace/artifacts/archive
                - --reload-url
                - http://smartcat-serving:8000/admin/reload-model
              volumeMounts:
                - name: ml-artifacts
                  mountPath: /workspace/artifacts
          volumes:
            - name: ml-artifacts
              persistentVolumeClaim:
                claimName: ml-artifacts
