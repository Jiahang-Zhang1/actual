apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - storage.yaml
  - mlflow-platform.yaml
  - actual-sync.yaml
  - serving.yaml
  - monitoring.yaml
  - data-quality-cronjob.yaml
  - training-pipeline-cronjob.yaml
  - rollout-decision-cronjob.yaml

configMapGenerator:
  - name: actual-ml-config
    literals:
      - ACTUAL_ML_SERVICE_URL=http://smartcat-serving:8000
      - BACKEND_KIND=baseline
      - MODEL_PATH=/workspace/artifacts/deployed/model.joblib
      - SOURCE_MODEL_PATH=/workspace/artifacts/deployed/model.joblib
      - MODEL_VERSION=v2_tfidf_linearsvc
      - TOP_K=3
      - MONITOR_WINDOW_MINUTES=60
      - PROMOTION_MIN_REQUESTS=100
      - PROMOTION_MIN_FEEDBACK=20
      - PROMOTION_MAX_P95_MS=100
      - PROMOTION_MAX_ERROR_RATE=0.01
      - PROMOTION_MIN_TOP1_ACCEPTANCE=0.60
      - PROMOTION_MIN_TOP3_ACCEPTANCE=0.80
      - ROLLBACK_MIN_REQUESTS=20
      - ROLLBACK_MIN_FEEDBACK=10
      - ROLLBACK_MAX_P95_MS=250
      - ROLLBACK_MAX_ERROR_RATE=0.02
      - ROLLBACK_MIN_TOP1_ACCEPTANCE=0.45
      - ROLLBACK_MIN_TOP3_ACCEPTANCE=0.70

images:
  - name: actualbudget/actual-sync
    newTag: latest
  - name: actualbudget/smartcat-serving
    newTag: latest
  - name: actualbudget/smartcat-mlops
    newTag: latest
