apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartcat-serving
  labels:
    app.kubernetes.io/name: smartcat-serving
    app.kubernetes.io/part-of: actual-smart-transaction-categorization
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: smartcat-serving
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smartcat-serving
        app.kubernetes.io/part-of: actual-smart-transaction-categorization
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: serving
          image: actualbudget/smartcat-serving:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.launch"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: actual-ml-config
          env:
            - name: SERVICE_HOST
              value: 0.0.0.0
            - name: SERVICE_PORT
              value: "8000"
            - name: WEB_CONCURRENCY
              # Keep one worker per pod so Prometheus sees complete per-pod
              # metrics; use replicas/HPA below for production scaling.
              value: "1"
            - name: RUNTIME_DIR
              value: /workspace/runtime
          volumeMounts:
            - name: ml-artifacts
              mountPath: /workspace/artifacts
            - name: runtime
              mountPath: /workspace/runtime
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
      volumes:
        - name: ml-artifacts
          persistentVolumeClaim:
            claimName: ml-artifacts
        - name: runtime
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: smartcat-serving
  labels:
    app.kubernetes.io/name: smartcat-serving
spec:
  selector:
    app.kubernetes.io/name: smartcat-serving
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smartcat-serving
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smartcat-serving
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
