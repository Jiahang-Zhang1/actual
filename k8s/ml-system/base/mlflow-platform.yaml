apiVersion: v1
kind: Secret
metadata:
  name: mlflow-platform-secrets
type: Opaque
stringData:
  postgres-user: mlflow
  postgres-password: mlflow
  postgres-db: mlflowdb
  minio-root-user: actual-minio
  minio-root-password: actual-minio-password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-minio-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-postgres
  labels:
    app.kubernetes.io/name: mlflow-postgres
    app.kubernetes.io/part-of: actual-smart-transaction-categorization
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: postgres-db
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: mlflow-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-postgres
spec:
  selector:
    app.kubernetes.io/name: mlflow-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-minio
  labels:
    app.kubernetes.io/name: mlflow-minio
    app.kubernetes.io/part-of: actual-smart-transaction-categorization
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z
          args: ['server', '/data', '--console-address', ':9001']
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: minio-root-password
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: mlflow-minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-minio
spec:
  selector:
    app.kubernetes.io/name: mlflow-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mlflow-minio-create-bucket
  labels:
    app.kubernetes.io/name: mlflow-minio-create-bucket
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: minio-root-password
          command: ['/bin/sh', '-c']
          args:
            - |
              until mc alias set minio http://mlflow-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "Waiting for MinIO before creating MLflow artifact bucket"
                sleep 5
              done
              mc mb --ignore-existing minio/mlflow-artifacts
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/part-of: actual-smart-transaction-categorization
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.9.0
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: MLFLOW_SERVER_ALLOWED_HOSTS
              value: '*'
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://mlflow-minio:9000
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: postgres-db
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: minio-root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-platform-secrets
                  key: minio-root-password
          command: ['/bin/sh', '-c']
          args:
            - |
              pip install psycopg2-binary boto3 &&
              mlflow server \
                --backend-store-uri "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@mlflow-postgres:5432/${POSTGRES_DB}" \
                --artifacts-destination s3://mlflow-artifacts/ \
                --serve-artifacts \
                --host 0.0.0.0 \
                --port 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: '1'
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
spec:
  selector:
    app.kubernetes.io/name: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
