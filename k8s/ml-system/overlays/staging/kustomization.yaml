apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: actual-ml-staging

resources:
  - namespace.yaml
  - ../../base

patches:
  - target:
      kind: Deployment
      name: smartcat-serving
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ROLLOUT_CONTEXT
          value: staging
  - target:
      kind: HorizontalPodAutoscaler
      name: smartcat-serving
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2

configMapGenerator:
  - name: actual-ml-config
    behavior: merge
    literals:
      - PROMOTION_MIN_REQUESTS=20
      - PROMOTION_MIN_FEEDBACK=5
      - ROLLBACK_MIN_REQUESTS=10
      - ROLLBACK_MIN_FEEDBACK=3
