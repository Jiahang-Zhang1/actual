apiVersion: batch/v1
kind: CronJob
metadata:
  name: build-training-set-cron
  namespace: actual-training
spec:
  schedule: '0 */6 * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: build-training-set-cron
        spec:
          restartPolicy: Never
          containers:
            - name: trainer
              image: YOUR_DOCKERHUB_USERNAME/actual-training-job:training
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: training-config
              command: ['/bin/sh', '-c']
              args:
                - |
                  python /app/training/build_training_set.py \
                    --db-path "$DB_PATH" \
                    --output "$OUTPUT_PATH"
              volumeMounts:
                - name: actual-data
                  mountPath: /data
                  readOnly: true
                - name: training-output
                  mountPath: /outputs
              resources:
                requests:
                  cpu: '250m'
                  memory: '512Mi'
                limits:
                  cpu: '1'
                  memory: '2Gi'
          volumes:
            - name: actual-data
              persistentVolumeClaim:
                claimName: actual-data-pvc
            - name: training-output
              persistentVolumeClaim:
                claimName: training-output-pvc
