apiVersion: v1
kind: Namespace
metadata:
  name: smartcat
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartcat-serving
  namespace: smartcat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartcat-serving
  template:
    metadata:
      labels:
        app: smartcat-serving
    spec:
      containers:
        - name: serve
          image: 10.233.51.71:5000/actualbudget-serving:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.launch"]
          ports:
            - containerPort: 8000
          env:
            - name: BACKEND_KIND
              value: "onnx_dynamic_quant"
            - name: MODEL_PATH
              value: "/workspace/models/optimized/v2_tfidf_linearsvc_model.dynamic_quant.onnx"
            - name: SOURCE_MODEL_PATH
              value: "/workspace/models/source/v2_tfidf_linearsvc_model.joblib"
---
apiVersion: v1
kind: Service
metadata:
  name: smartcat-serving
  namespace: smartcat
spec:
  type: NodePort
  selector:
    app: smartcat-serving
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30090
