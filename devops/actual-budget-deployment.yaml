apiVersion: v1
kind: Namespace
metadata:
  name: actual-budget
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actual-budget
  template:
    metadata:
      labels:
        app: actual-budget
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: actual-budget
          image: 10.233.51.71:5000/actual-sync:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5006
          env:
            - name: ACTUAL_PORT
              value: "5006"
            - name: ACTUAL_HOSTNAME
              value: "0.0.0.0"
            - name: ACTUAL_DATA_DIR
              value: "/data"
            - name: ACTUAL_ML_SERVICE_URL
              value: "http://smartcat-serving.smartcat.svc.cluster.local:8000"
            - name: ACTUAL_ML_SERVICE_TIMEOUT_MS
              value: "2500"
          volumeMounts:
            - name: actual-budget-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: actual-budget-data
          # Use emptyDir so the manifest runs on a fresh Chameleon K8s cluster
          # even when no default StorageClass is installed. Swap this to a PVC
          # for a long-lived production budget store.
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  # Keep the product service private. Public browser traffic enters through the
  # nginx HTTPS NodePort proxy; nginx then forwards to this service port.
  type: ClusterIP
  selector:
    app: actual-budget
  ports:
    - name: http
      port: 8083
      targetPort: 5006
