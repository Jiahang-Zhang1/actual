apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actual-budget
  template:
    metadata:
      labels:
        app: actual-budget
    spec:
      containers:
      - name: actual-budget
        image: 10.233.51.71:5000/actual-sync:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5006
        env:
        - name: ACTUAL_PORT
          value: "5006"
        - name: ACTUAL_HOSTNAME
          value: "0.0.0.0"
        - name: ACTUAL_DATA_DIR
          value: "/data"
        - name: ACTUAL_ML_SERVICE_URL
          value: "http://smartcat-serving.smartcat.svc.cluster.local:8000"
        - name: ACTUAL_ML_SERVICE_TIMEOUT_MS
          value: "2500"
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  type: NodePort
  selector:
    app: actual-budget
  ports:
  - name: http
    port: 8083
    targetPort: 8080
    nodePort: 30083
