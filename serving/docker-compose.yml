x-common: &common
  build:
    context: .
    dockerfile: docker/Dockerfile
  working_dir: /workspace
  env_file:
    - .env
  environment:
    PYTHONUNBUFFERED: '1'
    PYTHONPATH: /workspace
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    MLFLOW_REGISTER_MODEL_NAME: ${MLFLOW_REGISTER_MODEL_NAME:-actual-smart-transaction-categorizer}
    MLFLOW_PROMOTION_ALIAS: ${MLFLOW_PROMOTION_ALIAS:-production}
    MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://mlflow-minio:9000}
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-actual-minio}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-actual-minio-password}
  user: '${UID:-1000}:${GID:-1000}'
  volumes:
    - .:/workspace

services:
  serve:
    <<: *common
    container_name: actualbudget-serving-app
    command: ['python', '-m', 'app.launch']
    ports:
      - '${HOST_PORT:-8000}:8000'
    environment:
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: ${SERVICE_PORT:-8000}
      # Keep one worker per container so Prometheus scrapes a complete in-memory
      # metric set; scale with replicas/HPA instead of multi-worker processes.
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      BACKEND_KIND: ${BACKEND_KIND:-auto}
      MODEL_PATH: ${MODEL_PATH:-/workspace/models/optimized/v2_tfidf_linearsvc_model.dynamic_quant.onnx}
      SOURCE_MODEL_PATH: ${SOURCE_MODEL_PATH:-/workspace/models/source/v2_tfidf_linearsvc_model.joblib}
      MODEL_BUNDLE_DIR: ${MODEL_BUNDLE_DIR:-/workspace/runtime/deployed}
      MODEL_VERSION: ${MODEL_VERSION:-v2_tfidf_linearsvc}
      CODE_VERSION: ${CODE_VERSION:-dev}
      TOP_K: ${TOP_K:-3}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUNTIME_DIR: /workspace/runtime
      ROLLOUT_CONTEXT: ${ROLLOUT_CONTEXT:-production}
      MONITOR_WINDOW_MINUTES: ${MONITOR_WINDOW_MINUTES:-60}
      PROMOTION_MIN_REQUESTS: ${PROMOTION_MIN_REQUESTS:-100}
      PROMOTION_MIN_FEEDBACK: ${PROMOTION_MIN_FEEDBACK:-20}
      PROMOTION_MAX_P95_MS: ${PROMOTION_MAX_P95_MS:-100}
      PROMOTION_MAX_ERROR_RATE: ${PROMOTION_MAX_ERROR_RATE:-0.01}
      PROMOTION_MIN_TOP1_ACCEPTANCE: ${PROMOTION_MIN_TOP1_ACCEPTANCE:-0.60}
      PROMOTION_MIN_TOP3_ACCEPTANCE: ${PROMOTION_MIN_TOP3_ACCEPTANCE:-0.80}
      ROLLBACK_MIN_REQUESTS: ${ROLLBACK_MIN_REQUESTS:-20}
      ROLLBACK_MIN_FEEDBACK: ${ROLLBACK_MIN_FEEDBACK:-10}
      ROLLBACK_MAX_P95_MS: ${ROLLBACK_MAX_P95_MS:-250}
      ROLLBACK_MAX_ERROR_RATE: ${ROLLBACK_MAX_ERROR_RATE:-0.02}
      ROLLBACK_MIN_TOP1_ACCEPTANCE: ${ROLLBACK_MIN_TOP1_ACCEPTANCE:-0.45}
      ROLLBACK_MIN_TOP3_ACCEPTANCE: ${ROLLBACK_MIN_TOP3_ACCEPTANCE:-0.70}
    cpus: '${SERVICE_CPUS:-2.0}'
    mem_limit: '${SERVICE_MEM_LIMIT:-3g}'

  tooling:
    <<: *common
    profiles: ['tools']
    entrypoint: ['python']

  prometheus:
    image: prom/prometheus:latest
    container_name: actualbudget-serving-prometheus
    depends_on:
      - serve
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.console.templates=/etc/prometheus/consoles
      - --web.console.libraries=/etc/prometheus/console_libraries
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - ./monitoring/prometheus-console:/etc/prometheus/consoles:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: actualbudget-serving-grafana
    depends_on:
      - prometheus
    ports:
      - '${GRAFANA_PORT:-3000}:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

  mlflow-postgres:
    image: postgres:16-alpine
    container_name: actualbudget-mlflow-postgres
    environment:
      POSTGRES_USER: ${MLFLOW_POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${MLFLOW_POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${MLFLOW_POSTGRES_DB:-mlflowdb}
    volumes:
      - mlflow_postgres_data:/var/lib/postgresql/data

  mlflow-minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: actualbudget-mlflow-minio
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-actual-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-actual-minio-password}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - mlflow_minio_data:/data

  mlflow-minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    container_name: actualbudget-mlflow-minio-init
    depends_on:
      - mlflow-minio
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        until mc alias set minio http://mlflow-minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc mb --ignore-existing minio/mlflow-artifacts
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-actual-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-actual-minio-password}

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.9.0
    container_name: actualbudget-mlflow
    depends_on:
      - mlflow-postgres
      - mlflow-minio
      - mlflow-minio-init
    ports:
      - '${MLFLOW_PORT:-5000}:5000'
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: '*'
      MLFLOW_S3_ENDPOINT_URL: http://mlflow-minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-actual-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-actual-minio-password}
      POSTGRES_USER: ${MLFLOW_POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${MLFLOW_POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${MLFLOW_POSTGRES_DB:-mlflowdb}
    command:
      - /bin/sh
      - -c
      - |
        pip install psycopg2-binary boto3 &&
        mlflow server \
          --backend-store-uri "postgresql://$$POSTGRES_USER:$$POSTGRES_PASSWORD@mlflow-postgres:5432/$$POSTGRES_DB" \
          --artifacts-destination s3://mlflow-artifacts/ \
          --serve-artifacts \
          --host 0.0.0.0 \
          --port 5000

volumes:
  prometheus_data:
  grafana_data:
  mlflow_postgres_data:
  mlflow_minio_data:
